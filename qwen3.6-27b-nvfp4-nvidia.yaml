runtime: vllm
model: "nvidia/Qwen3.6-27B-NVFP4"
port: 8123
ctx: 262144
display_name: "Qwen3.6-27B NVFP4 (NVIDIA)"

# Qwen3_5ForConditionalGeneration: DENSE hybrid (linear_attn + interval full_attn)
# vision-language model, NVIDIA modelopt NVFP4 (hf_quant_config.json =
# MIXED_PRECISION, W4A16_NVFP4 g16, KV FP8). Stock vllm/vllm-openai:cu130-nightly
# is 0.19.2rc1 and predates qwen3_5 support; serve on the AEON vLLM 0.23 build
# (same image used for the qwen3_5 35B/27B NVFP4 siblings on GB10/sm_121a).
# ENTRYPOINT is /bin/bash -> needs entrypoint:.
image: "ghcr.io/aeon-7/aeon-vllm-ultimate:latest"
entrypoint: "vllm serve"

gpu_memory_utilization: 0.85   # solo only; drop to ~0.15 if coexisting w/ llama-server
max_num_seqs: 16
load_format: "fastsafetensors"
trust_remote_code: true
enforce_eager: false

env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: "sm_121a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

tool_call_parser: "qwen3_xml"
reasoning_parser: "qwen3"
attention_backend: "flashinfer"

# TEXT-ONLY: vision tower present in checkpoint but disabled (image=video=0) so
# vLLM skips the mm encoder and its memory. Raise these if you ever want VL.
limit_mm_per_prompt: '{"image":0,"video":0}'

# Do NOT force --quantization: this is a modelopt checkpoint, so let vLLM
# auto-detect modelopt_mixed (same lesson as the 35B modelopt sibling). Forcing
# compressed-tensors here mis-selects the handler on a modelopt export.
extra_args:
  - "--kv-cache-dtype"
  - "fp8"
  - "--max-num-batched-tokens"
  - "32768"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
