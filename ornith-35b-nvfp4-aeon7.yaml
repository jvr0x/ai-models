runtime: vllm
model: "AEON-7/Ornith-1.0-35B-AEON-Ultimate-Uncensored-NVFP4"
port: 8121
ctx: 262144
display_name: "Ornith-1.0-35B AEON Uncensored NVFP4 +DFlash"

# GB10/sm_121a (Blackwell) AEON vLLM build.
image: "ghcr.io/aeon-7/aeon-vllm-ultimate:latest"

# This image's ENTRYPOINT is /bin/bash, so `entrypoint:` is required or lmswitch
# runs `bash <model_dir>` -> exit 126 "Is a directory". Sets --entrypoint vllm + serve.
entrypoint: "vllm serve"

# GB10/sm_121a NVFP4 env the aeon recipes need (per QUICKSTART_DGX_SPARK.md).
env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: "sm_121a"
  VLLM_USE_FLASHINFER_SAMPLER: "1"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

# Per the model's QUICKSTART_DGX_SPARK.md (2026-06-28 DFlash patch): 0.60 is the
# safe value with DFlash n=6 on the unified pool (was 0.70; the patch lowered it
# to avoid unified-memory crashes). Stop the always-on llama-servers first
# (lmswitch off ...) or it will OOM/thrash the 128 GB pool.
gpu_memory_utilization: 0.60
max_num_seqs: 16
enforce_eager: false

tool_call_parser: "qwen3_coder"     # Qwen3 XML tool calls
reasoning_parser: "qwen3"           # split <think> reasoning_content
trust_remote_code: true
attention_backend: "flash_attn"     # main model; DFlash drafter keeps its default

# extra_args run INSIDE the container, appended last.
#  - NVFP4 weights are nvfp4-pack-quantized (compressed-tensors), NOT modelopt.
#  - --mamba-cache-dtype float32: precision for the GatedDeltaNet (SSM) state — required for this arch.
#  - Do NOT set --kv-cache-dtype fp8: the vision tower forces BF16 KV.
#  - DFlash drafter: use AEON-7/AEON-DFlash-Qwen3.6-35B-A3B — the 2026-06-28 patch's
#    RECOMMENDED drafter (all-full-attention, drop-in, NO hotfix image, ~3.71 tok/step).
#    NOT z-lab/Qwen3.6-35B-A3B-DFlash: its sliding-window-attention layers trip a
#    KV-page-size assert on this hybrid arch and would need a custom hotfix image.
#    Referenced by HF id; lmswitch mounts ~/.cache/huggingface/hub so vLLM resolves
#    it from cache. n=6 is the single-stream throughput peak per the QuickStart.
extra_args:
  - "--quantization"
  - "compressed-tensors"
  - "--mamba-cache-dtype"
  - "float32"
  - "--max-num-batched-tokens"
  - "16384"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--speculative-config"
  - '{"method":"dflash","model":"AEON-7/AEON-DFlash-Qwen3.6-35B-A3B","num_speculative_tokens":6}'
