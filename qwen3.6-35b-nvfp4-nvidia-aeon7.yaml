runtime: vllm
model: "nvidia/qwen3.6-35b-a3b-nvfp4"
port: 8114
ctx: 262144
display_name: "Qwen3.6-35B-A3B NVFP4 (NVIDIA)"

# IMAGE: the stock vllm/vllm-openai:cu130-nightly is vLLM 0.19.2rc1 — too old:
# its qwen3_5.py loader can't map this checkpoint's per-expert `input_scale`
# tensors (crashed with `KeyError: layers.0.mlp.experts.w2_input_scale`,
# independent of --moe-backend / --quantization). The AEON image is vLLM 0.23.0
# built for this exact qwen3_5_moe arch on GB10/sm_121a, so we serve the NVIDIA
# modelopt checkpoint on it too. ENTRYPOINT is /bin/bash -> needs entrypoint:.
image: "ghcr.io/aeon-7/aeon-vllm-ultimate:latest"
entrypoint: "vllm serve"

# GB10/sm_121a env for the AEON build + NVFP4 alloc tuning.
env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: "sm_121a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

# This is a modelopt MIXED_PRECISION checkpoint (hf_quant_config.json): MoE
# experts W4A16_NVFP4 with per-expert input_scale, linear-attn FP8, KV FP8.
# Do NOT force --quantization (let it auto-detect `modelopt_mixed`, the correct
# mixed-precision handler). MoE backend: do NOT force one — the experts are
# W4A16_NVFP4 with group_size=16, which flashinfer_cutlass's NVFP4 MoE kernel
# rejects; let vLLM's select_nvfp4_moe_backend oracle auto-pick a compatible
# backend. (NVIDIA's card recommends `marlin`, but that isn't even a valid
# moe-backend value in this vLLM.)
gpu_memory_utilization: 0.4
max_num_seqs: 4
tool_call_parser: "qwen3_xml"
reasoning_parser: "qwen3"
attention_backend: "flashinfer"
load_format: "fastsafetensors"
trust_remote_code: true
enforce_eager: false

extra_args:
  - "--kv-cache-dtype"
  - "fp8"
  - "--max-num-batched-tokens"
  - "8192"
  - "--enable-chunked-prefill"
  - "--async-scheduling"
  - "--enable-prefix-caching"
  - "--speculative-config"
  - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
