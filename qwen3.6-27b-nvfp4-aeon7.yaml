runtime: vllm
model: "AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-NVFP4"
port: 8122
ctx: 262144
display_name: "Qwen3.6-27B AEON Uncensored NVFP4 +DFlash"

# AEON GB10/sm_121a vLLM 0.23 build. ENTRYPOINT is /bin/bash -> needs entrypoint:.
image: "ghcr.io/aeon-7/aeon-vllm-ultimate:latest"
entrypoint: "vllm serve"
env:
  TORCH_CUDA_ARCH_LIST: "12.1a"
  CUTE_DSL_ARCH: "sm_121a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

# Per the model README: serve on the AEON image with the external z-lab DFlash
# drafter at n=10, compressed-tensors, --mamba-cache-dtype float32, and do NOT
# set --kv-cache-dtype (the non-causal DFlash drafter needs BF16 KV). Do NOT
# force marlin — the AEON image's CUTLASS NVFP4 path is faster. 0.85 solo.
gpu_memory_utilization: 0.85
max_num_seqs: 16
tool_call_parser: "qwen3_coder"
reasoning_parser: "qwen3"
trust_remote_code: true
attention_backend: "flash_attn"
enforce_eager: false               # CUDA graphs on for DFlash throughput (z-lab 27B drafter is full-attention, so no KV-page assert)

# DFlash drafter z-lab/Qwen3.6-27B-DFlash referenced by HF id (cached; lmswitch
# mounts ~/.cache/huggingface/hub). If it trips the cudagraph KV-page assert like
# the 35B z-lab drafter did, fall back to the checkpoint's built-in MTP layer:
#   '{"method":"mtp","num_speculative_tokens":3}'   (config has mtp_num_hidden_layers:1)
extra_args:
  - "--quantization"
  - "compressed-tensors"
  - "--mamba-cache-dtype"
  - "float32"
  - "--max-num-batched-tokens"
  - "16384"
  - "--enable-chunked-prefill"
  - "--enable-prefix-caching"
  - "--speculative-config"
  - '{"method":"dflash","model":"z-lab/Qwen3.6-27B-DFlash","num_speculative_tokens":10}'
